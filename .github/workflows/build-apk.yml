name: Build APK

# Quand l'APK est (re)compilé : a chaque push, ou manuellement via l'onglet Actions.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Preparer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer les dependances
        run: npm install

      - name: Ajouter la plateforme Android
        run: npx cap add android

      - name: Autoriser la camera dans le manifeste
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <application#' "$MANIFEST"
          echo "----- AndroidManifest.xml -----"
          cat "$MANIFEST"

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Compiler l'APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Mettre l'APK en telechargement (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FreshTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publier dans les Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FreshTrack build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
